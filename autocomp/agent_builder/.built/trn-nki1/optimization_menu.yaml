optimizations:
- strategy: reduce data movement
- strategy: overlap data movement and compute
- strategy: loop tiling
- strategy: loop reordering and restructuring
- strategy: fuse operations
- strategy: use lower precision
- strategy: double buffering
- strategy: software pipelining
- strategy: hoist redundant operations out of loops
- strategy: simplify or remove unnecessary code
- strategy: Maximize partition dimension to 128 lanes per instruction via partition vectorization of independent operations
- strategy: Fuse multiply, add, and nonlinear ops into single pipelined `nisa.activation` instructions
- strategy: Swap stationary/moving operand assignment to leverage fast LoadStationary and minimize downstream transposes
- strategy: Replace DMA-based transposes with `nl.load` followed by `nisa.nc_transpose` when TensorE is idle
- strategy: Accumulate partial matmul results in PSUM banks across contraction-dimension tiles to avoid HBM round-trips
- strategy: Ensure DMA transfers are ≥32KiB by maximizing partition and free dimension sizes per load/store
- strategy: Ensure compute tile free dimensions are ≥128 elements to amortize fixed ~100-cycle instruction overhead
- strategy: Use `nisa.tensor_tensor_scan` for prefix-sum patterns instead of many sequential dependent scalar operations
- strategy: Declare temporary SBUF buffers inside inner loops to prevent compiler-induced spilling
- strategy: Use direct allocation APIs to explicitly control SBUF/PSUM placement and bypass compiler allocator heuristics
- strategy: Keep reused tensors resident in SBUF across all consuming operations to avoid redundant HBM reloads
- strategy: Map reduction axis to matching engine (TensorE for P-dim, VectorE for F-dim) to avoid intermediate transposes
- strategy: Use `affine_range` for dependency-free loops to enable compiler loop vectorization and pipelining
- strategy: Tile free dimensions to fit all active tiles (LHS, RHS, accumulators) within SBUF budget simultaneously
- strategy: Broadcast scalar reciprocal and multiply instead of element-wise division for normalization
- strategy: Pre-transpose inputs outside main compute loops so inner iterations avoid repeated layout conversion
- strategy: Fuse normalization with quantization in a single kernel pass to eliminate intermediate HBM traffic
- strategy: Use SPMD grid parallelism with `program_id` offsets to distribute independent tiles across cores
- strategy: Leverage multiple PSUM banks to pipeline TensorE accumulation with VectorE/ScalarE consumption
- strategy: Use execution masks for non-aligned boundary handling instead of padding or conditional logic
