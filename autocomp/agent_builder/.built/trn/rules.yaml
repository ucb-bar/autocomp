general:
- The rewritten program should be semantically equivalent to the original program, within a small numerical tolerance.
- Keep the same function name and signature as the original program (helper functions can be renamed or deleted).
- The partition dimension (P) is always exactly 128 for SBUF and PSUM tiles; any tile with P > 128 will fail compilation with
  'Size of partition dimension exceeds architecture limitation of 128'.
- All kernel inputs and outputs must be HBM tensors; SBUF/PSUM tensors cannot be kernel parameters or return values—data must
  be loaded from HBM into SBUF via nl.load() before computation and stored back to HBM via nl.store() after computation.
- The free dimension (F) of PSUM tiles must not exceed 512 FP32 elements (2 KiB per partition); exceeding this causes a hard
  tile-size constraint violation.
planning:
- Limit the scope of the plan to the selected optimization.
- Do not count out any of the optimizations unless they are clearly irrelevant to the code.
- For matmul operations, the contraction axis (K) must map to the partition dimension; this requires transposing input matrices
  so that both operands have shape [K, M] and [K, N] respectively, not [M, K] and [K, N].
- When a tensor's logical block dimension exceeds the physical tile capacity, the kernel must explicitly loop over blocks
  using nl.affine_range() (for independent iterations) or nl.sequential_range() (for loop-carried dependencies); the compiler
  will not automatically tile.
- SBUF and PSUM are software-managed with no hardware cache; if cumulative live tensor size exceeds capacity (~24 MiB for
  SBUF, ~2 MiB for PSUM), the compiler inserts spill/refill DMA transfers, degrading performance significantly.
coding:
- Wrap the generated code with ```python at the beginning and ``` at the end.
- Tiles in SBUF/PSUM must have at least 2 dimensions; a 1D tensor like nl.zeros((128,), buffer=nl.sbuf) will fail with 'Insufficient
  rank'—use nl.zeros((128, 1), buffer=nl.sbuf) instead.
- When indexing a tensor with fewer indices than dimensions (e.g., tensor[i] instead of tensor[i, :, :]), the result is a
  view with reduced rank; this view must have its partition dimension as the first dimension to be a valid Tile for compute
  APIs.
- Reduction output tensors must be explicitly stored to HBM or copied to SBUF before being reused in subsequent operations;
  reading a reduction result directly from PSUM without intermediate storage causes undefined behavior.
