- '`nl.ndarray` does not initialize memory; contents are undefined until explicitly written via `nisa.dma_copy`, `nisa.memset`,
  or a compute instruction. Reading before writing is undefined behavior. For accumulation buffers, explicitly initialize
  with `nisa.memset` to zero.'
- The `dynamic_range` loop variable is a device register (`VirtualRegister`), not a Python `int`; it cannot be used in host-side
  Python expressions like `if i == 0:`. Static loops (`static_range`, `affine_range`, `sequential_range`) require compile-time
  constant bounds and are fully unrolled.
- Access patterns on SBUF/PSUM partition dimension must be contiguous (no striding/skipping partitions); flexible strided/gather/scatter
  indexing is only supported along the free dimension. The `.ap()` method's first tuple must describe the partition dimension
  with step equal to the total free-dimension element count.
- Sub-kernels (functions called from a top-level `@nki.jit` kernel) must NOT have the `@nki.jit` decorator; only the top-level
  entry kernel should be decorated. `print()` inside kernels executes at compile time, not runtime; use `device_print` for
  runtime output.
- '`dynamic_range` loops inside `nl.no_reorder()` blocks are not supported — place `no_reorder` inside the loop body instead.
  `nisa.memset` value type must exactly match the destination tensor''s dtype. `nisa.dma_copy` `dst`/`src` parameter names
  control copy direction — reversing them silently produces incorrect data movement.'
- 'When using `tensor_scalar` on Scalar Engine, only these op combinations are supported: op0=nl.multiply with op1=nl.add,
  op0=nl.multiply with op1=None, or op0=nl.add with op1=None. Both op0 and op1 must be the same type (both arithmetic or
  both bitvec). tensor_tensor: the two input tiles cannot both reside in PSUM; at least one must be in SBUF.'
