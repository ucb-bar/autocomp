general:
- The rewritten program should be semantically equivalent to the original program, within a small numerical tolerance.
- Keep the same function name and signature as the original program (helper functions can be renamed or deleted).
- Pallas kernel functions receive mutable `Ref` objects, not `jax.Array`s; reading requires explicit indexing (e.g., `x_ref[...]`
  or `x_ref[:]`) and outputs must be written to output `Ref`s via mutation (e.g., `o_ref[...] = value`). The kernel must not
  return any values.
- On TPU, block shapes must have rank ≥ 1 (no scalar/0D blocks). The last two dimensions of a block must each be divisible
  by 8 and 128 respectively, OR equal the full corresponding array dimension. For 1D blocks, the dimension must equal the
  array dimension, be a multiple of 1024, or be a power of 2 ≥ 128*(32/bitwidth).
- The `index_map` function in a `BlockSpec` must accept exactly `len(grid)` arguments and return exactly `len(block_shape)`
  block indices. In default blocked indexing mode, returned indices are multiplied by `block_shape` to compute element offsets.
- Elementwise operations on TPU only support 32-bit types in hardware; narrower-precision operands must be upcast to a 32-bit
  type before applying elementwise operations. Matrix multiplication always accumulates in float32, and even float32 operands
  are rounded to bfloat16 unless explicit precision is requested.
- The kernel function must not close over constants; all needed arrays must be passed as explicit inputs with proper `BlockSpec`s.
planning:
- Limit the scope of the plan to the selected strategy.
- Do not count out any of the strategies unless they are clearly irrelevant to the code.
- Block shapes in `BlockSpec` must evenly divide the corresponding array dimensions (or use padding semantics where out-of-bounds
  elements contain garbage on input and are discarded on output). Grid dimensions must be sized accordingly (e.g., array_dim
  / block_dim).
- Reduction/accumulation axes must be the last (innermost) grid dimensions. Output blocks accessed across iterations must
  be on consecutive iterations in lexicographic grid order; non-consecutive access to the same output block produces incorrect
  values.
- 'When using `PrefetchScalarGridSpec` with `num_scalar_prefetch=n`, no `BlockSpec`s are specified for the first n arguments.
  The kernel signature orders arguments as: prefetch refs, input refs, output refs, scratch refs. The `index_map` receives
  grid indices followed by prefetch `Ref`s.'
- Loops (`fori_loop`, `for_loop`) are fully unrolled at compile time; trip counts must be kept small enough to avoid compilation
  failure. Semaphores must have value zero at program exit—every signal must have a matching wait.
- On TPU, scalar outputs must use SMEM memory space (`BlockSpec(memory_space=pltpu.SMEM)`). Buffers in `pl.ANY` (HBM) cannot
  be dereferenced directly—data must first be copied to VMEM or SMEM via `sync_copy`/`async_copy`.
coding:
- Wrap the generated code with ``` at the beginning and ``` at the end.
- '`pallas_call` requires `out_shape` to define output buffer shapes/dtypes, and `compiler_params` must be a backend-specific
  dataclass (e.g., `pltpu.CompilerParams()`), not a plain dictionary. The `BlockSpec` constructor takes `block_shape` before
  `index_map`.'
- DMA semaphores must be allocated with `pltpu.SemaphoreType.DMA` type; regular semaphores use `pltpu.SemaphoreType.REGULAR`.
  All signaled semaphores must be waited on before program exit (non-zero semaphore at exit causes a crash). `async_copy`
  `.wait()` must be called before accessing copied data.
- '`pl.load`, `pl.store`, `pl.swap`, `pl.atomic_*`, `pltpu.TPUCompilerParams`, `pltpu.TPUMemorySpace`, and `pltpu.ANY` have
  been removed. Use indexing syntax for load/store, `pltpu.CompilerParams`/`pltpu.MemorySpace` for compiler params/memory
  spaces, and `pl.ANY` for the ANY memory space.'
- When using `pltpu.make_async_remote_copy` with `device_id_type=pl.DeviceIdType.MESH`, `device_id` must be a tuple (e.g.,
  `(neighbor,)`), not a bare integer. `src_ref` must reference a local buffer—TPUs can only push data, never read remote memory
  directly.
- When using `pltpu.emit_pipeline` with dynamic block shapes, the dynamic-sized dimension must use `pl.BoundedSlice(max_size)`
  in the block shape, and the `index_map` must return `pl.ds(start, size)` with element indices. `core_axis` must reference
  a parallel grid axis.
