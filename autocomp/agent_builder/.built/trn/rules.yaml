coding:
- Wrap the generated code with ```python at the beginning and ``` at the end.
- Reduction output must be stored or consumed before reuse in subsequent operations.
- Explicit DMA transfers (dma_copy, dma_transpose) must be used to move data between
  HBM and SBUF; no implicit caching occurs.
- When using transpose operations, prefer fast transpose via TensorE in FP16/BF16
  over byte-level transpose for performance; byte-level transpose is significantly
  slower.
- SBUF layout support (v3+) includes Row-major, Col-major-2B, and Col-major-4B; choose
  appropriate layout to enable efficient access patterns without explicit transpose.
- Do not use the block dimension in NKI tensor creation routines (deprecated as of
  Neuron 2.24; will error in 2.25+).
general:
- The rewritten program should be semantically equivalent to the original program,
  within a small numerical tolerance.
- Keep the same function name and signature as the original program (helper functions
  can be renamed or deleted).
- Each NKI kernel executes on a single NeuronCore; cross-core parallelism is handled
  at the framework level, not within the kernel.
- SBUF and PSUM are software-managed on-chip memory, not hardware-cached. The programmer
  must explicitly orchestrate all DMA transfers between HBM and SBUF.
- TensorE always accumulates matrix multiply results in FP32 or INT32 (v2/v3) or FP32/BF16
  (v4), regardless of input precision. Explicit casting is required before storing
  results in lower precision.
- 'On-chip SRAM per NeuronCore: v2 (~24 MiB estimated), v3 (28 MiB), v4 (32 MiB).
  Tiles in scratchpad must not exceed these limits.'
- Arithmetic intensity (ops/byte) must exceed ~230 ops/byte (Trn1/Trn2) or ~137 ops/byte
  (Trn3) to be compute-bound rather than memory-bandwidth-bound.
- "Using BF16/FP16/FP8 for TensorE inputs provides up to 4\xD7 throughput over FP32;\
  \ FP16 risks overflow beyond \xB165504, so BF16 is safer for unknown value ranges."
- Models/kernels are compiled for specific shapes and configurations. Dynamic shapes
  are supported at the ISA level but sequence bucketing is common in practice.
- Larger batches improve hardware utilization by amortizing parameter reads from HBM
  across more samples, up to the compute-bound ceiling.
planning:
- Limit the scope of the plan to the selected optimization.
- Do not count out any of the optimizations unless they are clearly irrelevant to
  the code.
- Maximize data reuse through tiling and fusion to keep data in SBUF/PSUM and avoid
  HBM round-trips, given the high arithmetic intensity requirements.
- Consider using PSUM near-memory accumulation for efficient matmul accumulation patterns
  to avoid separate read-modify-write cycles.
- 'Plan for compute-communication overlap: collective communication runs on dedicated
  CCE hardware separate from compute engines, so kernel execution is not blocked by
  concurrent collective operations.'
- For Trn2/Trn3, verify that the compiler LNC (Logical NeuronCore) setting matches
  the runtime configuration when combining multiple physical NeuronCores.
