general:
- The rewritten program should be semantically equivalent to the original program,
  within a small numerical tolerance.
- Keep the same function name and signature as the original program (helper functions
  can be renamed or deleted).
- All tensor dimensions must be known at compile time; dynamic shapes are not supported.
- The partition dimension (axis 0) is always 128 on NeuronCore-v2; free dimensions
  are all other axes.
- Data movement between HBM and on-chip SRAM (SBUF/PSUM) via DMA is the primary performance
  bottleneck and must be minimized.
- Tiles in SBUF cannot exceed 192 KB total size; PSUM tiles cannot exceed 2 KB per
  partition per bank.
- Matrix multiplication (nc_matmul) must read from SBUF and write to PSUM; inputs
  and outputs cannot be reversed.
planning:
- Limit the scope of the plan to the selected optimization.
- Do not count out any of the optimizations unless they are clearly irrelevant to
  the code.
- When planning data layout, account for the fact that SBUF and PSUM have separate
  address spaces and require explicit DMA transfers between them.
- Identify opportunities to reuse data in on-chip memory across multiple operations
  to reduce HBM bandwidth consumption.
- For operations exceeding hardware size limits (e.g., large normalization kernels),
  plan decomposition into smaller sub-operations that fit within constraints.
coding:
- Wrap the generated code with ```python at the beginning and ``` at the end.
- Reduction results must be stored to a tile before being reused as input to another
  operation; intermediate reduction values cannot be directly chained.
- When using direct allocation APIs (psum.alloc, sbuf.alloc, psum.mod_alloc, sbuf.mod_alloc),
  do not mix them with automatic allocation (psum.auto_alloc, sbuf.auto_alloc) in
  the same kernel.
- Loop variables and runtime values cannot be used for static indexing operations;
  only compile-time constants and affine expressions are permitted for tile indexing.
- "The partition axis size of input tiles to nc_matmul must be identical and \u2264\
  128; free axis of stationary must be \u2264128, free axis of moving must be \u2264\
  512."
- When writing to PSUM via nc_matmul or other Tensor Engine operations, ensure the
  output tile does not exceed 2 KB per partition; use multiple smaller operations
  or accumulation if necessary.
