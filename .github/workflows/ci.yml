name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WANDB_MODE: disabled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: pytest autocomp_tests/ -v

  visualizer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visualizer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: visualizer/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
